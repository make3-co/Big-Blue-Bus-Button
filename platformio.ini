[env:adafruit_feather_esp32s3_nopsram]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
board_build.partitions = default_8MB.csv
lib_deps =
    fastled/FastLED @ ^3.10.3
