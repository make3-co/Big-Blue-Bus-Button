; PlatformIO Project Configuration
; Big Blue Bus Button — Dual environment
;
; feather_esp32s3  : Main button unit (Adafruit Feather ESP32-S3 with 4MB Flash + 2MB PSRAM)
; receiver_esp32s3 : Wireless receiver (Feather ESP32-S3) → USB HID spacebar

[env:feather_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs
build_src_filter = +<*> -<../src_qtpy/>
build_flags =
    -std=gnu++2a
build_unflags =
    -std=gnu++11
lib_deps =
    adafruit/Adafruit NeoPXL8
    adafruit/Adafruit NeoPixel
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12
    bblanchon/ArduinoJson
    adafruit/Adafruit LC709203F
    adafruit/Adafruit MAX1704X
lib_ignore =
    Adafruit Zero DMA Library
    Adafruit ZeroTimer Library
    Adafruit TinyUSB Library
    FlashStorage
    Adafruit InternalFlash
    Adafruit CPFS

[env:receiver_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
build_src_filter = -<*> +<../src_qtpy/>
build_flags =
    -DARDUINO_USB_MODE=0
